<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d0d4dc"/>
      <stop offset="100%" stop-color="#7a7e8c"/>
    </linearGradient>
    <linearGradient id="edgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8ac4ff"/>
      <stop offset="60%" stop-color="#3D79F2"/>
      <stop offset="100%" stop-color="#1a4fd4"/>
    </linearGradient>
    <radialGradient id="novaGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="35%" stop-color="#c0dcff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#8ac4ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- N: left pillar -->
  <rect x="24" y="24" width="32" height="152" rx="4" fill="url(#metalGrad)"/>

  <!-- N: right pillar -->
  <rect x="144" y="24" width="32" height="152" rx="4" fill="url(#metalGrad)"/>

  <!-- N: diagonal — the "edge" -->
  <polygon points="24,24 56,24 176,176 144,176" fill="url(#edgeGrad)"/>

  <!-- Nova flare: glow at origin of the diagonal -->
  <circle cx="40" cy="24" r="18" fill="url(#novaGlow)" filter="url(#glow)"/>

  <!-- Nova core: 4-point sparkle -->
  <g transform="translate(40, 24)" opacity="0.9">
    <line x1="0" y1="-7" x2="0" y2="7" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
    <line x1="-7" y1="0" x2="7" y2="0" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
